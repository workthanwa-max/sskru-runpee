name: SSKRU - CI

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4

      - name: Load website credential
        run: |
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> apps/website/.env
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}" >> apps/website/.env
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> apps/website/.env
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> apps/website/.env
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" >> apps/website/.env
          echo "NEXT_PUBLIC_FIREBASE_APPID=${{ secrets.FIREBASE_APPID }}" >> apps/website/.env
          echo "NEXT_PUBLIC_GRAPHQL_ENDPOINT=${{ secrets.GRAPHQL_ENDPOINT }}" >> apps/website/.env
          echo "NEXT_PUBLIC_TEMPLETE_PERSONNEL_UPLOAD=${{ vars.TEMPLETE_PERSONNEL_UPLOAD }}" >> apps/website/.env

      - name: Load api-gateway credential
        run: |
          mkdir -p apps/api-gateway/src/common/secrets/
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' | jq -c . > apps/api-gateway/src/common/secrets/credential.json

      - run: pnpm exec nx run-many -t codegen
      - run: pnpm exec nx affected -t lint test build
      - run: pnpm run clean
